<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Study Materials</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a0033, #0b001a);
    color: #fff;
    text-align: center;
    margin: 0; padding: 0;
  }
  h1 {
    margin-top: 40px;
    font-size: 26px;
    color: #ffd85e;
    text-shadow: 0 0 15px rgba(255,216,94,0.8);
  }
  .container {
    margin-top: 40px;
    display: inline-block;
    padding: 30px 40px;
    background: rgba(255,255,255,0.08);
    border: 2px solid #ffd85e;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,216,94,0.2);
  }
  .file-item {
    background: linear-gradient(90deg, #00bcd4, #00e5ff);
    color: #000; border-radius: 12px;
    padding: 15px; margin: 12px 0; width: 280px;
    cursor: pointer; font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
  }
  .file-item:hover {
    transform: scale(1.06);
    background: linear-gradient(90deg, #18ffff, #00e6d3);
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
  }
</style>
</head>
<body>

<h1 id="subjectTitle">📚 Study Materials</h1>

<div class="container" id="materials">
  <h2>AVAILABLE FILES</h2>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const subject = localStorage.getItem('subject') || prompt("Enter subject to view materials:");
  document.getElementById('subjectTitle').textContent = subject.toUpperCase() + " - Study Materials";

  let uploads = JSON.parse(localStorage.getItem('uploads')) || [];
  let filtered = uploads.filter(u => u.subject.toLowerCase() === subject.toLowerCase());

  const container = document.getElementById('materials');
  if (filtered.length === 0) {
    container.innerHTML += `<p style="color: #ff6666;">⚠️ No files uploaded for this subject yet.</p>`;
    return;
  }

  filtered.forEach(u => {
    const fileDiv = document.createElement('div');
    fileDiv.className = 'file-item';
    fileDiv.innerHTML = `📘 ${u.fileName}<br><small>Year: ${u.year}</small>`;
    fileDiv.onclick = () => {
      const link = document.createElement('a');
      link.href = u.fileContent; // Base64 data
      link.download = u.fileName;
      link.target = "_blank";
      link.click();
    };
    container.appendChild(fileDiv);
  });
});
</script>

</body>
</html>
