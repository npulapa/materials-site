<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Materials</title>

<style>

body{
font-family:Arial;
background:#f9f9f9;
text-align:center;
}

.container{
width:80%;
margin:auto;
}

.file{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:8px 15px;
margin:5px;
border:none;
cursor:pointer;
}

.view{
background:#28a745;
color:white;
}

.download{
background:#007bff;
color:white;
}

</style>
</head>

<body>

<h2>📚 Study Materials</h2>

<div class="container" id="materialsList"></div>

<script>

const list=document.getElementById("materialsList");

function loadMaterials(){

let uploads=JSON.parse(localStorage.getItem("uploads"))||[];

list.innerHTML="";

if(uploads.length===0){

list.innerHTML="<p>No materials available</p>";
return;

}

uploads.forEach(file=>{

let div=document.createElement("div");
div.className="file";

div.innerHTML=`

<b>${file.subject}</b><br>
${file.fileName} (${file.year})
<br>

<a href="${file.fileURL}" target="_blank">
<button class="view">View</button>
</a>

<a href="${file.fileURL}" download="${file.fileName}">
<button class="download">Download</button>
</a>

`;

list.appendChild(div);

});

}

loadMaterials();

</script>

</body>
</html>
