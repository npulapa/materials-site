<!DOCTYPE html>
<html>
<head>

<title>Study Materials</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f9f9f9;
}

.file{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:8px 15px;
margin:5px;
border:none;
cursor:pointer;
}

.view{
background:green;
color:white;
}

.download{
background:blue;
color:white;
}

</style>

</head>

<body>

<h2>Study Materials</h2>

<div id="materialsList"></div>

<script>

const list=document.getElementById("materialsList");

const params=new URLSearchParams(window.location.search);
const selectedSubject=params.get("subject");

function loadMaterials(){

let uploads=JSON.parse(localStorage.getItem("uploads"))||[];

list.innerHTML="";

let filtered=uploads.filter(file=>file.subject===selectedSubject);

if(filtered.length===0){

list.innerHTML="<p>No files available for this subject</p>";
return;

}

filtered.forEach(file=>{

let div=document.createElement("div");
div.className="file";

div.innerHTML=`

<h3>${file.subject}</h3>

<p>${file.fileName}</p>
<p>${file.year}</p>

<button class="view" onclick="viewFile('${file.fileURL}')">View</button>

<button class="download" onclick="downloadFile('${file.fileURL}','${file.fileName}')">Download</button>

`;

list.appendChild(div);

});

}

function viewFile(url){

window.open(url,"_blank");

}

function downloadFile(url,name){

let a=document.createElement("a");

a.href=url;

a.download=name;

a.click();

}

loadMaterials();

</script>

</body>
</html>
