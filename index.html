<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Study Materials</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#f6d365,#fda085);
margin:0;
padding:0;
text-align:center;
}

h1{
margin-top:30px;
color:#333;
}

.container{
margin-top:30px;
display:flex;
justify-content:center;
}

.material-box{
background:white;
padding:25px;
border-radius:15px;
width:80%;
max-width:700px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.file-item{
background:#f0f9ff;
padding:15px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.file-details{
text-align:left;
}

.btn{
border:none;
padding:7px 12px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.download{
background:#2196F3;
color:white;
}

</style>
</head>

<body>

<h1 id="subjectTitle">📚 Study Materials</h1>

<div class="container">

<div class="material-box">

<h3>Available Files</h3>

<div id="materialsList"></div>

</div>

</div>

<script>

const materialsList=document.getElementById("materialsList");

/* GET SELECTED SUBJECT */
const selectedSubject=localStorage.getItem("subject");

document.getElementById("subjectTitle").innerText="📚 "+selectedSubject+" Materials";

function loadMaterials(){

let uploads=JSON.parse(localStorage.getItem("uploads"))||[];

materialsList.innerHTML="";

/* FILTER ONLY SELECTED SUBJECT FILES */
let filtered=uploads.filter(file=>file.subject===selectedSubject);

if(filtered.length===0){
materialsList.innerHTML="<p>No materials available for this subject.</p>";
return;
}

filtered.forEach(file=>{

let div=document.createElement("div");
div.className="file-item";

div.innerHTML=`

<div class="file-details">
<b>${file.subject}</b><br>
${file.fileName} (Year ${file.year})
</div>

<div>
<a href="${file.fileURL}" download="${file.fileName}">
<button class="btn download">Download</button>
</a>
</div>

`;

materialsList.appendChild(div);

});

}

loadMaterials();

</script>

</body>
</html>
