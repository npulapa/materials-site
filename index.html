<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Study Materials</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f2f2f2; /* simple background */
color:#333;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:40px;
font-size:26px;
color:#333;
}

.container{
margin-top:40px;
display:inline-block;
padding:30px 40px;
background:#ffffff;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.file-item{
background:#00bcd4;
color:#fff;
border-radius:12px;
padding:15px;
margin:12px 0;
width:280px;
cursor:pointer;
font-weight:600;
transition:all 0.3s ease;
}

.file-item:hover{
transform:scale(1.06);
background:#0097a7;
}

</style>
</head>

<body>

<h1 id="subjectTitle">📚 Study Materials</h1>

<div class="container" id="materials">
<h2>AVAILABLE FILES</h2>
</div>

<script>

window.addEventListener("DOMContentLoaded",()=>{

const subject = localStorage.getItem("subject") || "Subject";

document.getElementById("subjectTitle").innerText =
subject + " - Study Materials";

let uploads = JSON.parse(localStorage.getItem("uploads")) || [];

let filtered = uploads.filter(u =>
u.subject.toLowerCase() === subject.toLowerCase()
);

const container = document.getElementById("materials");

if(filtered.length === 0){

container.innerHTML +=
`<p style="color:red;">⚠️ No files uploaded for this subject yet.</p>`;

return;
}

filtered.forEach(u=>{

const fileDiv = document.createElement("div");

fileDiv.className="file-item";

fileDiv.innerHTML =
`📘 ${u.fileName}<br><small>Year: ${u.year}</small>`;

fileDiv.onclick=()=>{

const link=document.createElement("a");

link.href=u.fileContent;

link.download=u.fileName;

link.target="_blank";

link.click();

};

container.appendChild(fileDiv);

});

});

</script>

</body>
</html>
