<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Study Materials</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
margin:0;
}

h1{
margin-top:30px;
}

.container{
width:80%;
margin:auto;
}

.file{
background:white;
margin:15px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:8px 15px;
margin:5px;
border:none;
cursor:pointer;
border-radius:5px;
}

.view{
background:#28a745;
color:white;
}

.download{
background:#007bff;
color:white;
}

</style>
</head>

<body>

<h1>📚 Study Materials</h1>

<div class="container" id="materialsList"></div>

<script>

const list=document.getElementById("materialsList");

function loadMaterials(){

let uploads=JSON.parse(localStorage.getItem("uploads"))||[];

list.innerHTML="";

if(uploads.length===0){
list.innerHTML="<p>No materials uploaded yet.</p>";
return;
}

uploads.forEach(file=>{

let div=document.createElement("div");
div.className="file";

div.innerHTML=`
<h3>${file.subject}</h3>

<p>
📄 ${file.fileName} <br>
🎓 ${file.year}
</p>

<button class="view" onclick="viewFile('${file.fileURL}')">
View
</button>

<button class="download" onclick="downloadFile('${file.fileURL}','${file.fileName}')">
Download
</button>
`;

list.appendChild(div);

});

}

function viewFile(url){

window.open(url,"_blank");

}

function downloadFile(url,name){

let a=document.createElement("a");
a.href=url;
a.download=name;
a.click();

}

loadMaterials();

</script>

</body>
</html>
